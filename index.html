function App() {
  const [charA, setCharA] = useState(CHARS.find(c=>c.id==='sakuragi'));
  const [charB, setCharB] = useState(CHARS.find(c=>c.id==='rukawa'));
  const [appMode, setAppMode] = useState('vs');
  const [charStats, setCharStats] = useState(
    () => Object.fromEntries(CHARS.map(c => [c.id, {...c.stats}]))
  );
  const [playerAlias, setPlayerAlias] = useState(
    () => localStorage.getItem('animevs_alias') || ''
  );
  const [changingAlias, setChangingAlias] = useState(false);
  const [showTierModal, setShowTierModal] = useState(false);

  // Sincronizar con Firebase al cargar la app si hay alias válido
  useEffect(() => {
    const alias = localStorage.getItem('animevs_alias');
    if (!alias || alias === 'Jugador') return;
    const sync = () => {
      if (!window.savePlayerToFirebase) return;
      const w   = parseInt(localStorage.getItem('animevs_wins')||'0');
      const l   = parseInt(localStorage.getItem('animevs_losses')||'0');
      const rp  = parseInt(localStorage.getItem('animevs_rp')||'0');
      const fav = localStorage.getItem('animevs_fav_char')||'sakuragi';
      window.savePlayerToFirebase(alias, w, l, rp, fav);
    };
    // Pequeño delay para que el módulo Firebase termine de cargar
    const t = setTimeout(sync, 1500);
    return () => clearTimeout(t);
  }, []);

  const saveAlias = (name) => {
    localStorage.setItem('animevs_alias', name);
    setPlayerAlias(name);
    setChangingAlias(false);
    // Sincronizar stats actuales con Firebase bajo el nuevo nombre
    if (window.savePlayerToFirebase) {
      const w = parseInt(localStorage.getItem('animevs_wins')||'0');
      const l = parseInt(localStorage.getItem('animevs_losses')||'0');
      const rp = parseInt(localStorage.getItem('animevs_rp')||'0');
      const fav = localStorage.getItem('animevs_fav_char')||'sakuragi';
      window.savePlayerToFirebase(name, w, l, rp, fav);
    }
  };

  const getPlayerTier = () => {
    const wins = parseInt(localStorage.getItem('animevs_wins')||'0');
    if (wins >= 70)  return { emoji:'🔴', label:'Leyenda',     color:'#ef4444' };
    if (wins >= 50)  return { emoji:'🟠', label:'Estrella',    color:'#f97316' };
    if (wins >= 30)  return { emoji:'🟡', label:'Titular',     color:'#eab308' };
    if (wins >= 10)  return { emoji:'🔵', label:'Novato',      color:'#3b82f6' };
    return                   { emoji:'🟢', label:'Principiante', color:'#22c55e' };
  };

  const handleGameResult = (charId, result) => {
    const isWin = result === 'player';
    // Stats del personaje
    const delta = isWin ? 3 : -2;
    setCharStats(prev => {
      const s = {...prev[charId]};
      STAT_KEYS.forEach(k => { s[k] = Math.max(1, Math.min(100, s[k] + delta)); });
      return {...prev, [charId]: s};
    });
    // Monedas
    const earned = isWin ? 100 : 20;
    const prevCoins = parseInt(localStorage.getItem('animevs_coins')||'0');
    localStorage.setItem('animevs_coins', String(prevCoins + earned));
    // Victorias / derrotas
    const prevW = parseInt(localStorage.getItem('animevs_wins')||'0');
    const prevL = parseInt(localStorage.getItem('animevs_losses')||'0');
    if (isWin) localStorage.setItem('animevs_wins', String(prevW+1));
    else        localStorage.setItem('animevs_losses', String(prevL+1));
    // Ranking Points: +15 por victoria, -8 por derrota (mín 0)
    const prevRP = parseInt(localStorage.getItem('animevs_rp')||'0');
    const newRP  = Math.max(0, prevRP + (isWin ? 15 : -8));
    localStorage.setItem('animevs_rp', String(newRP));
    // Personaje favorito
    localStorage.setItem('animevs_fav_char', charId);
    // Guardar en Firebase
    const alias = localStorage.getItem('animevs_alias');
    const newW = parseInt(localStorage.getItem('animevs_wins')||'0');
    const newL = parseInt(localStorage.getItem('animevs_losses')||'0');
    if (window.savePlayerToFirebase) {
      window.savePlayerToFirebase(alias, newW, newL, newRP, charId);
    }
  };

  const getLevel = charId =>
    Math.round(STAT_KEYS.reduce((a,k) => a + charStats[charId][k], 0) / STAT_KEYS.length);

  return (
    <div style={{minHeight:'100vh',position:'relative',zIndex:1}}>
      <FeedbackButton playerAlias={playerAlias}/>
      {(!playerAlias||changingAlias) && (
        <NicknameModal
          onSave={saveAlias}
          onSkip={changingAlias ? ()=>setChangingAlias(false) : ()=>saveAlias('Jugador')}
          canSkip={!changingAlias}
          currentAlias={changingAlias ? playerAlias : ''}
        />
      )}
      {/* Header */}
      <div style={{textAlign:'center',padding:'22px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
        <h1 className="tf app-title" style={{fontSize:42,background:'linear-gradient(135deg,#f6ad55,#fc8181,#9f7aea)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
          🏀 SLAM DUNK VS
        </h1>
        <p className="app-subtitle" style={{fontSize:12,color:'#cbd5e1',letterSpacing:2,marginTop:4}}>EQUIPO SHOHOKU &#183; ELIGE TUS JUGADORES &#183; JUEGA UN PARTIDO</p>
        {playerAlias&&(()=>{
          const tier = getPlayerTier();
          const wins = parseInt(localStorage.getItem('animevs_wins')||'0');
          const TIERS = [
            { emoji:'🟢', label:'Principiante', color:'#22c55e', min:0,  max:9  },
            { emoji:'🔵', label:'Novato',       color:'#3b82f6', min:10, max:29 },
            { emoji:'🟡', label:'Titular',      color:'#eab308', min:30, max:49 },
            { emoji:'🟠', label:'Estrella',     color:'#f97316', min:50, max:69 },
            { emoji:'🔴', label:'Leyenda',      color:'#ef4444', min:70, max:null},
          ];
          return (
            <>
              <p style={{fontSize:11,color:'#f6ad55',marginTop:4,letterSpacing:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                👤 {playerAlias}
                {playerAlias==='Jugador'&&(
                  <span onClick={()=>setChangingAlias(true)} style={{
                    fontSize:10,cursor:'pointer',opacity:.5,
                    transition:'opacity .2s'}}
                    title="Elegir nombre">✏️</span>
                )}
                <span onClick={()=>setShowTierModal(true)} style={{
                  background:`${tier.color}22`,
                  border:`1px solid ${tier.color}66`,
                  color:tier.color,
                  borderRadius:99,padding:'2px 8px',
                  fontSize:10,fontWeight:700,letterSpacing:.5,
                  cursor:'pointer',transition:'all .2s'}}>
                  {tier.emoji} {tier.label} ▾
                </span>
              </p>
              {showTierModal&&(
                <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,.8)',
                  display:'flex',alignItems:'center',justifyContent:'center',padding:20}}
                  onClick={()=>setShowTierModal(false)}>
                  <div style={{background:'linear-gradient(145deg,#1a1a2e,#16213e)',
                    border:'2px solid rgba(255,255,255,.12)',borderRadius:20,
                    padding:'28px 24px',width:'100%',maxWidth:340,
                    boxShadow:'0 8px 40px rgba(0,0,0,.7)'}}
                    onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>setShowTierModal(false)}
                      style={{position:'absolute',top:12,right:14,background:'none',border:'none',
                        color:'#fff',fontSize:20,cursor:'pointer',opacity:.6}}>✕</button>
                    <p style={{fontFamily:'Bangers,cursive',fontSize:22,letterSpacing:2,
                      color:'#fff',marginBottom:4,textAlign:'center'}}>🏅 RANGOS</p>
                    <p style={{fontSize:11,color:'rgba(255,255,255,.4)',textAlign:'center',marginBottom:18}}>
                      Tus victorias: <strong style={{color:'#60a5fa'}}>{wins}W</strong>
                    </p>
                    {TIERS.map(t=>{
                      const isCurrent = t.label===tier.label;
                      const done = wins>=t.min;
                      const next = !done ? t.min - wins : null;
                      return (
                        <div key={t.label} style={{
                          display:'flex',alignItems:'center',gap:10,
                          padding:'10px 12px',borderRadius:10,marginBottom:6,
                          background: isCurrent?`${t.color}22`:'rgba(255,255,255,.03)',
                          border:`1.5px solid ${isCurrent?t.color:'rgba(255,255,255,.07)'}`,
                          boxShadow: isCurrent?`0 0 14px ${t.color}44`:'none'}}>
                          <span style={{fontSize:20}}>{t.emoji}</span>
                          <div style={{flex:1}}>
                            <p style={{fontFamily:'Bangers,cursive',fontSize:15,
                              color:isCurrent?t.color:done?'rgba(255,255,255,.9)':'rgba(255,255,255,.65)',
                              margin:0,letterSpacing:1}}>
                              {t.label}
                              {isCurrent&&<span style={{fontSize:9,marginLeft:6,
                                background:t.color,color:'#000',borderRadius:4,
                                padding:'1px 5px'}}>ACTUAL</span>}
                            </p>
                            <p style={{fontSize:10,color:'rgba(255,255,255,.6)',margin:0}}>
                              {t.max ? `${t.min}–${t.max} victorias` : `${t.min}+ victorias`}
                            </p>
                          </div>
                          {done
                            ? <span style={{fontSize:14,color:'#22c55e'}}>✓</span>
                            : <span style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>-{next}W</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          );
        })()}
      </div>

      {appMode==='race'&&(
        <RaceMode
          onBack={()=>setAppMode('vs')}
          charStats={charStats}
          onResult={handleGameResult}
          selectedChar={charA}
          fixedAiChar={charB}
          playerRP={parseInt(localStorage.getItem('animevs_rp')||'0')}
        />
      )}
      {appMode==='campaign'&&(
        <CampaignMode
          onBack={()=>setAppMode('vs')}
          charStats={charStats}
          onUpdateStats={handleGameResult}
        />
      )}
      {appMode==='ranking'&&(
        <RankingScreen onBack={()=>setAppMode('vs')} playerAlias={playerAlias}/>
      )}

      <div style={{maxWidth:540,margin:'0 auto',padding:14}}>

        {/* CHARACTER GRID */}
        <div className="card" style={{padding:14,marginBottom:14}}>
          <p style={{fontSize:12,fontWeight:700,color:'#cbd5e1',letterSpacing:1,
            textTransform:'uppercase',marginBottom:10}}>Elige dos jugadores</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
            {CHARS.map(c=>(
              <CharMini key={c.id} char={c}
                selected={charA?.id===c.id||charB?.id===c.id}
                onSelect={c2=>{
                  if(charA?.id===c2.id){ setCharA(null); return; }
                  if(charB?.id===c2.id){ setCharB(null); return; }
                  if(!charA){ setCharA(c2); } else { setCharB(c2); }
                }}
              />
            ))}
          </div>
          {(!charA||!charB)&&(
            <p style={{textAlign:'center',fontSize:11,color:'#94a3b8',marginTop:10}}>
              {!charA&&!charB?'Elige dos jugadores'
                :!charA?'Falta el primer jugador'
                :'Falta el segundo jugador'}
            </p>
          )}
        </div>

        {/* FIGHTER CARDS */}
        <div style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:14}}>
          <BigCharCard char={charA} side="A"
            level={charA?getLevel(charA.id):null}
            stats={charA?charStats[charA.id]:null}/>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',
            gap:4,flexShrink:0,paddingTop:18}}>
            <span className="tf vs-label" style={{fontSize:22,
              background:'linear-gradient(135deg,#f6ad55,#fc8181)',
              WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>VS</span>
          </div>
          <BigCharCard char={charB} side="B"

            stats={charB?charStats[charB.id]:null}/>

        {/* ACTION BUTTONS — side by side 50/50 */}
        <div style={{display:'flex',gap:10,marginTop:4,alignItems:'flex-start'}}>

          {/* JUGAR PARTIDO */}
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:5}}>
            <button className="vs-btn"
              style={{width:'100%',height:110,
                background: charA&&charB
                  ? 'linear-gradient(160deg,#c45c00 0%,#e07000 40%,#c45c00 100%)'
                  : 'rgba(255,255,255,.04)',
                border: charA&&charB
                  ? '2px solid #ff9020'
                  : '2px solid rgba(255,255,255,.07)',
                boxShadow: charA&&charB
                  ? '0 0 0 1px #ff901040,0 6px 32px rgba(200,90,0,.55),inset 0 1px 0 rgba(255,200,80,.2)'
                  : 'none',
                borderRadius:18,transition:'all .25s',
                display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',gap:4}}
              onClick={()=>{ if(charA&&charB) setAppMode('race'); }}
              disabled={!charA||!charB}>
              <span style={{fontSize:24}}>🏀</span>
              <span style={{fontFamily:'Bangers',fontSize:17,letterSpacing:2,
                color: charA&&charB ? '#fff' : '#475569',
                textShadow: charA&&charB ? '0 2px 8px rgba(0,0,0,.6)' : 'none',
                lineHeight:1.15,textAlign:'center'}}>
                {charA&&charB ? <><br style={{display:'none'}}/>JUGAR PARTIDO</> : <>ELIGE 2<br/>JUGADORES</>}
              </span>
            </button>
            <p style={{textAlign:'center',fontSize:10,color:'#94a3b8',lineHeight:1.4,paddingInline:2,minHeight:28}}>
              {charA&&charB
                ? <>Ganar <span style={{color:'#4ade80'}}>+3</span> · Perder <span style={{color:'#f87171'}}>-2</span> stats</>
                : <span style={{color:'#475569'}}>Selecciona 2 jugadores</span>}
            </p>
          </div>

          {/* MODO CAMPAÑA */}
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:5}}>
            <button className="vs-btn"
              style={{width:'100%',height:110,
                background:'linear-gradient(160deg,#1e0a5e 0%,#5b21b6 45%,#1e0a5e 100%)',
                border:'2px solid #8b5cf6',
                boxShadow:'0 0 0 1px #8b5cf640,0 6px 32px rgba(109,40,217,.55),inset 0 1px 0 rgba(180,130,255,.15)',
                borderRadius:18,
                display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',gap:4}}
              onClick={()=>setAppMode('campaign')}>
              <span style={{fontSize:24}}>🏆</span>
              <span style={{fontFamily:'Bangers',fontSize:17,letterSpacing:2,color:'#e9d5ff',
                textShadow:'0 2px 8px rgba(0,0,0,.6)',lineHeight:1.15,textAlign:'center'}}>
                MODO CAMPAÑA
              </span>
            </button>
            <p style={{textAlign:'center',fontSize:10,color:'#94a3b8',lineHeight:1.4,paddingInline:2,minHeight:28}}>
              4 rivales · <span style={{color:'#f59e0b'}}>🪙</span> compra ventajas de dados
            </p>
          </div>

        </div>{/* end action buttons flex */}

        {/* RANKING BUTTON */}
        <button onClick={()=>setAppMode('ranking')}
          style={{width:'100%',marginTop:10,padding:'13px',borderRadius:14,cursor:'pointer',
            background:'linear-gradient(135deg,#1a0a3e,#2d1b69)',
            border:'2px solid rgba(251,191,36,.5)',
            boxShadow:'0 0 0 1px rgba(251,191,36,.15),0 4px 24px rgba(251,191,36,.2)',
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,
            transition:'all .2s'}}>
          <span style={{fontSize:20}}>🏆</span>
          <span style={{fontFamily:'Bangers,cursive',fontSize:18,letterSpacing:3,color:'#fbbf24',
            textShadow:'0 0 12px rgba(251,191,36,.6)'}}>VER RANKING</span>
          <span style={{fontSize:20}}>🏆</span>
        </button>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
