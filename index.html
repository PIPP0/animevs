<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
  import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-analytics.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC7cxO7kGF9dhx58FRIjfnDuvySq0pNWKU",
    authDomain: "animevs-6e4db.firebaseapp.com",
    projectId: "animevs-6e4db",
    storageBucket: "animevs-6e4db.firebasestorage.app",
    messagingSenderId: "1035693287339",
    appId: "1:1035693287339:web:3c1e8c58946bad6b3dd4ee",
    measurementId: "G-0C9BVGE7PW"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  // Registrar visita
  logEvent(analytics, 'page_view');

  // API global para el juego
  window.firebaseDB = db;
  window.firebaseAnalytics = analytics;
  window.firebaseLogEvent = logEvent;

  // Guardar/actualizar jugador en Firestore
  window.savePlayerToFirebase = async (alias, wins, losses, rp, favChar) => {
    if (!alias || alias === 'Jugador') return;
    try {
      const ref = doc(db, 'ranking', alias);
      const snap = await getDoc(ref);
      // Solo actualiza si los datos son mejores o es nuevo
      await setDoc(ref, {
        alias, wins, losses, rp, favChar,
        updatedAt: Date.now()
      }, { merge: true });
    } catch(e) { console.warn('Firebase write error:', e); }
  };

  // Obtener top 10 del ranking global (orden: victorias desc, luego RP como desempate)
  window.getGlobalRanking = async () => {
    try {
      const q = query(collection(db, 'ranking'), orderBy('wins', 'desc'), limit(10));
      const snap = await getDocs(q);
      const data = snap.docs.map(d => d.data());
      // Desempate por % de victorias cuando wins son iguales
      return data.sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        const pctA = a.wins + a.losses > 0 ? a.wins / (a.wins + a.losses) : 0;
        const pctB = b.wins + b.losses > 0 ? b.wins / (b.wins + b.losses) : 0;
        return pctB - pctA;
      });
    } catch(e) { console.warn('Firebase read error:', e); return []; }
  };

  // Guardar feedback de usuario
  window.saveFeedback = async (alias, text) => {
    try {
      await addDoc(collection(db, 'feedback'), {
        alias: alias || 'Anónimo',
        text,
        createdAt: Date.now()
      });
      return true;
    } catch(e) { console.warn('Feedback error:', e); return false; }
  };
</script>

// ─── CHARACTER IMAGES (PNG files in same folder) ─────────────────────────────
function CharFace({ charId, size=80 }) {
  const c = CHARS.find(ch=>ch.id===charId);
  const col = c?.color||'#718096';
  const [err, setErr] = React.useState(false);
  if (!err) return (
    <img src={`./${charId}.png`} alt={charId}
      onError={()=>setErr(true)}
      style={{width:size,height:size,objectFit:'cover',objectPosition:'top center',display:'block'}}/>
  );
  return (
    <div style={{width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center',
      background:`radial-gradient(circle at 35% 30%,${col}cc,${col}66)`,fontSize:size*.42,
      fontFamily:'Bangers',color:'rgba(255,255,255,.95)'}}>{c?.name?.[0]||'?'}</div>
  );
}

function CharMini({ char, selected, onSelect }) {
  return (
    <div onClick={()=>onSelect(char)} className="char-mini-wrap" style={{
      padding:8, borderRadius:12, cursor:'pointer', transition:'all .2s',
      background: selected ? `${char.color}22` : 'rgba(255,255,255,.04)',
      border: `2px solid ${selected ? char.color : 'rgba(255,255,255,.08)'}`,
      boxShadow: selected ? `0 0 16px ${char.color}44` : 'none',
      transform: selected ? 'scale(1.04)' : 'scale(1)',
      textAlign:'center',
    }}>
      <div className="char-mini-face" style={{borderRadius:'50%',overflow:'hidden',width:50,height:50,
        margin:'0 auto 5px',border:`2px solid ${char.color}44`,
        boxShadow: selected ? `0 0 12px ${char.color}66` : 'none'}}>

      </div>
      <p style={{fontFamily:'Bangers',fontSize:11,color:char.color,letterSpacing:1,lineHeight:1}}>{char.name}</p>

  );
}

const PIPS_MAP = {
  1:[[50,50]],
  2:[[28,28],[72,72]],

  4:[[28,28],[72,28],[28,72],[72,72]],
  5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
  6:[[28,20],[72,20],[28,50],[72,50],[28,80],[72,80]],
};
const FACE_SHOW = {
  1:'rotateX(0deg)   rotateY(0deg)',
  2:'rotateX(90deg)  rotateY(0deg)',
  3:'rotateX(0deg)   rotateY(-90deg)',
  4:'rotateX(0deg)   rotateY(90deg)',
  5:'rotateX(-90deg) rotateY(0deg)',
  6:'rotateX(0deg)   rotateY(180deg)',
};
function Dice3D({val, rolling: isRolling, color, size=54}) {
  const half = size / 2;
  const r = size / 9;
  const faceStyle = (extraT, lgt=1) => ({
    position:'absolute', width:size, height:size, borderRadius:r,
    backfaceVisibility:'hidden', transform: extraT,
    background:`linear-gradient(145deg,${color}${lgt>.85?'ff':'cc'},${color}${lgt>.85?'cc':'88'})`,
    border:`1.5px solid rgba(255,255,255,${lgt*.25})`, overflow:'hidden',
  });
  const Pip = ({x,y}) => (
    <div style={{
      position:'absolute', left:`${x}%`, top:`${y}%`,
      width:size/7.5, height:size/7.5,
      background:'rgba(255,255,255,.95)', borderRadius:'50%',
      transform:'translate(-50%,-50%)',
      boxShadow:'0 1px 4px rgba(0,0,0,.7), inset 0 1px 1px rgba(255,255,255,.4)',
    }}/>
  );
  const Face = ({n, transform, lgt}) => (
    <div style={faceStyle(transform, lgt)}>
      {n===1&&<><div style={{position:'absolute',inset:0,background:'linear-gradient(145deg,rgba(255,255,255,.2),transparent)',borderRadius:r}}/></>}
      {(PIPS_MAP[n]||[]).map(([x,y],i)=><Pip key={i} x={x} y={y}/>)}
    </div>
  );
  return (
    <div style={{width:size, height:size, perspective:`${size*4}px`, flexShrink:0, position:'relative'}}>
      <div style={{position:'absolute',bottom:-5,left:'10%',right:'10%',height:8,
        background:'rgba(0,0,0,.5)',borderRadius:'50%',filter:'blur(5px)'}}/>
      <div style={{
        width:size, height:size, position:'relative', transformStyle:'preserve-3d',
        transition: isRolling ? 'none' : 'transform .5s cubic-bezier(.34,1.56,.64,1)',
        animation: isRolling ? 'diceRollCube .6s ease-in-out infinite' : 'none',
        transform: isRolling ? undefined : (val ? FACE_SHOW[val] : 'rotateX(-22deg) rotateY(28deg)'),
      }}>
        <Face n={1} transform={`translateZ(${half}px)`}          lgt={1}/>
        <Face n={6} transform={`rotateY(180deg) translateZ(${half}px)`} lgt={.7}/>
        <Face n={3} transform={`rotateY(90deg) translateZ(${half}px)`}  lgt={.8}/>
        <Face n={4} transform={`rotateY(-90deg) translateZ(${half}px)`} lgt={.75}/>
        <Face n={2} transform={`rotateX(-90deg) translateZ(${half}px)`} lgt={.9}/>
        <Face n={5} transform={`rotateX(90deg) translateZ(${half}px)`}  lgt={.6}/>
      </div>
      {val&&!isRolling&&<div style={{
        position:'absolute',inset:-3,borderRadius:r+3,
        boxShadow:`0 0 16px ${color}88, 0 0 32px ${color}44`, pointerEvents:'none',
      }}/>}
      {!val&&!isRolling&&<div style={{
        position:'absolute',inset:0,display:'flex',alignItems:'center',
        justifyContent:'center',fontFamily:'Bangers',fontSize:size*.5,
        color:`${color}44`, pointerEvents:'none',
      }}>?</div>}
    </div>
  );
}

// ─── CHAR REACTIONS on score ──────────────────────────────────────────────────
const CHAR_REACTIONS = {
  sakuragi: { text:'¡SOY UN GENIO!',   color:'#e53e3e', bg:'#e53e3e22' },
  rukawa:   { text:'...',               color:'#3182ce', bg:'#3182ce22' },
  miyagi:   { text:'¡VELOCIDAD!',      color:'#38b2ac', bg:'#38b2ac22' },
  akagi:    { text:'¡POTENCIA!',       color:'#d97706', bg:'#d9770622' },
  mitsui:   { text:'¡TRIPLE!!!',       color:'#6b46c1', bg:'#6b46c122' },
};

// ─── RACE MODE ────────────────────────────────────────────────────────────────
const MOD_POOLS = { high:[4,5,6], low:[1,2,3], even:[2,4,6], odd:[1,3,5] };
const rollWithMod = mod => {
  const pool = mod ? MOD_POOLS[mod] : null;
  return pool ? pool[Math.floor(Math.random()*pool.length)] : Math.ceil(Math.random()*6);
};

function RaceMode({ onBack, charStats={}, onResult, selectedChar, diceModifier=null, fixedAiChar=null, playerRP=0, campaignDiff=null }) {
  const TOTAL     = 21;
  const WIN_NEED  = 2;  // pieces needed to win
  const SPECIALS  = {
    4:  { emoji:'⚡', label:'FAST BREAK', text:'+2 pasos', selfD:+2, color:'#22c55e' },
    7:  { emoji:'🤚', label:'FOUL',       text:'-2 pasos', selfD:-2, color:'#ef4444' },
    11: { emoji:'🏀', label:'SLAM DUNK',  text:'+4 pasos', selfD:+4, color:'#f59e0b' },
    14: { emoji:'🛑', label:'BLOQUEO',    text:'Pierde turno', selfD:0, oppD:0, color:'#7c3aed' },
    17: { emoji:'3️⃣', label:'TRIPLE',     text:'+3 pasos', selfD:+3, color:'#06b6d4' },
  };
  const SHOHOKU = CHARS; // all chars are Shohoku players

  const [char, setChar]               = useState(selectedChar || CHARS[0]);
  const [aiIdx, setAiIdx]             = useState(0);
  const [localMod, setLocalMod]       = useState(diceModifier);
  const [showDicePanel, setShowDicePanel] = useState(false);
  const [gameCoins, setGameCoins]     = useState(()=>parseInt(localStorage.getItem('animevs_coins')||'0'));
  const isCampaign = !!fixedAiChar;
  const [pPos, setPPos]               = useState([0,0,0,0]);
  const [aPos, setAPos]               = useState([0,0,0,0]);
  const pPosRef                       = useRef([0,0,0,0]);
  const aPosRef                       = useRef([0,0,0,0]);
  const [phase, setPhase]             = useState('player');
  const [diceVal, setDiceVal]         = useState(null);
  const [aiDiceVal, setAiDiceVal]     = useState(null);
  const [rolling, setRolling]         = useState(false);
  const [aiRolling, setAiRolling]     = useState(false);
  const [selectLanes, setSelectLanes] = useState([]);
  const [captureFlash, setCaptureFlash] = useState(null);
  const [floats, setFloats]           = useState({});
  const [popup, setPopup]             = useState(null);
  const [status, setStatus]           = useState('');
  const [gameOver, setGameOver]       = useState(null);
  const [skipAI, setSkipAI]           = useState(false);
  const [skipPlayer, setSkipPlayer]   = useState(false);
  const skipPlayerRef                 = useRef(false);
  const [hoopAnim, setHoopAnim]       = useState(null); // {player,lane} while scoring
  const [celebAnim, setCelebAnim]     = useState(null); // {charId,color,text,isPlayer}

  const D = ms => new Promise(res => setTimeout(res, ms));
  const opponents = SHOHOKU.filter(c => c.id !== char.id);
  const aiChar = fixedAiChar || opponents[aiIdx % opponents.length] || CHARS[1];

  // Track has exactly (TOTAL-1) = 20 cells for pos=1..20.
  // pos=20 (last) sits directly under the finish zone at 13%.
  // cellH = 75/(TOTAL-1). posY centers piece in its cell.
  const TC   = TOTAL - 1;                                           // 20 playable rows
  const CELL = 75 / TC;                                             // 3.75% per cell
  const posY = pos => pos === 0 ? 94 : 13 + (TC - pos + 0.5) * CELL;

  // A piece can move only if it won't overshoot TOTAL
  const canMove = (from, roll) => from < TOTAL && from + roll <= TOTAL;

  const setP = (lane, pos) => {
    pPosRef.current = pPosRef.current.map((v,i) => i===lane ? Math.max(0, Math.min(TOTAL, pos)) : v);
    setPPos([...pPosRef.current]);
  };
  const setA = (lane, pos) => {
    aPosRef.current = aPosRef.current.map((v,i) => i===lane ? Math.max(0, Math.min(TOTAL, pos)) : v);
    setAPos([...aPosRef.current]);
  };

  const showFloat = (player, lane, val) => {
    const k = `${player}${lane}`;
    setFloats(f => ({...f, [k]: {val, ts: Date.now()}}));
    setTimeout(() => setFloats(f => { const n={...f}; delete n[k]; return n; }), 1100);
  };
  const showPop = async (sp, ms=1300) => { setPopup(sp); await D(ms); setPopup(null); };

  const moveSteps = async (player, lane, steps) => {
    const ref    = player==='p' ? pPosRef : aPosRef;
    const setter = player==='p' ? setP    : setA;
    const from   = ref.current[lane];
    const to     = Math.min(TOTAL, from + steps);
    for (let pos = from+1; pos <= to; pos++) { await D(135); setter(lane, pos); }
    return to;
  };

  const checkCapture = async (mover, lane, pos) => {
    if (pos <= 0 || pos >= TOTAL) return;
    const oppRef    = mover==='p' ? aPosRef : pPosRef;
    const oppSetter = mover==='p' ? setA    : setP;
    if (oppRef.current[lane] !== pos) return;
    setCaptureFlash(lane);
    setTimeout(() => setCaptureFlash(null), 900);
    showFloat(mover==='p' ? 'a' : 'p', lane, '💥');
    await D(550);
    oppSetter(lane, 0);
    setStatus(mover==='p'
      ? `¡${char.name} capturó al rival en carril ${lane+1}!`
      : `¡${aiChar.name} capturó tu balón en carril ${lane+1}!`);
    await D(700);
  };

  const applySpecial = async (player, lane, pos) => {
    const sp = SPECIALS[pos];
    if (!sp) return pos;
    await showPop(sp, 1100);
    // selfD: mueve la pieza propia paso a paso
    const delta = sp.selfD || 0;
    let newPos = pos;
    if (delta !== 0) {
      const target = Math.max(0, Math.min(TOTAL, pos + delta));
      const step   = delta > 0 ? 1 : -1;
      for (let p = pos + step; delta > 0 ? p <= target : p >= target; p += step) {
        await D(150);
        (player==='p' ? setP : setA)(lane, p);
      }
      newPos = target;
    }
    // BLOQUEO: quien cae pierde su próximo turno
    if (sp.oppD !== undefined) {
      const selfName = player === 'p' ? char.name : aiChar.name;
      setStatus(`🛑 ¡BLOQUEO! ${selfName} pierde su próximo turno`);
      if (player === 'p') { skipPlayerRef.current = true; setSkipPlayer(true); }
      else                setSkipAI(true);
      await D(800);
    }
    return newPos;
  };

  const checkWin = player =>
    (player==='p' ? pPosRef : aPosRef).current.filter(p => p >= TOTAL).length >= WIN_NEED;

  const rollDice = async () => {
    if (phase !== 'player' || !char) return;
    setRolling(true);
    await D(900); setRolling(false);
    const roll = rollWithMod(localMod);
    setLocalMod(null);
    setShowDicePanel(false);
    setDiceVal(roll);
    const movable = pPosRef.current.map((p,i) => canMove(p, roll) ? i : -1).filter(i => i >= 0);
    if (!movable.length) {
      setStatus(`Sacaste ${roll} — ningún balón cabe exacto. Turno CPU.`);
      await D(1800); setPhase('ai'); await runAI(); return;
    }
    setPhase('select'); setSelectLanes(movable);
    setStatus(`Sacaste ${roll} — elige un jugador para avanzar`);
  };

  const triggerScore = async (scoringChar, isPlayer, lane) => {
    const rx = CHAR_REACTIONS[scoringChar.id] || { text:'¡CANASTA!', color:'#fff', bg:'#ffffff22' };
    setHoopAnim({player: isPlayer ? 'p' : 'a', lane});
    setCelebAnim({charId: scoringChar.id, color: rx.color, bg: rx.bg, text: rx.text, isPlayer});
    await D(2000);
    setHoopAnim(null); setCelebAnim(null);
  };

  const onSelectLane = async lane => {
    if (phase !== 'select' || !selectLanes.includes(lane)) return;
    setSelectLanes([]); setPhase('moving');
    let to = await moveSteps('p', lane, diceVal);
    showFloat('p', lane, `+${diceVal}`);
    if (to >= TOTAL) { await triggerScore(char, true, lane); }
    to = await applySpecial('p', lane, to);
    await checkCapture('p', lane, to);
    if (checkWin('p')) { setGameOver('player'); setPhase('gameover'); return; }
    setPhase('ai'); await D(1500); await runAI();
  };

  const runAI = async () => {
    if (skipAI) {
      setSkipAI(false);
      setStatus(`🛑 ${aiChar.name} pierde turno por BLOQUEO`);
      await D(1600);
      setPhase('player'); setStatus('¡Tu turno!'); return;
    }
    setStatus(`${aiChar.name} está tirando...`);
    await D(700);
    setAiRolling(true);
    await D(900); setAiRolling(false);
    // Dificultad suave: a más RP del jugador, leve chance de que IA saque el mejor de 2 dados
    // Máximo 15% de ventaja (a 500+ RP). Siempre el jugador puede ganar.
    const diffBonus = campaignDiff !== null ? campaignDiff : Math.min(playerRP / 500, 0.15);
    const r1 = Math.ceil(Math.random()*6);
    const r2 = Math.ceil(Math.random()*6);
    const roll = Math.random() < diffBonus ? Math.max(r1,r2) : r1;
    setAiDiceVal(roll);
    setStatus(`${aiChar.name} saca ${roll}`);
    await D(480);
    const available = aPosRef.current.map((p,i) => canMove(p, roll) ? i : -1).filter(i => i >= 0);
    if (!available.length) {
      setStatus(`${aiChar.name} no puede avanzar. ¡Tu turno!`);
      await D(1400); setPhase('player'); setStatus('¡Tu turno!'); return;
    }
    let lane = null;
    for (const l of available) {
      const np = aPosRef.current[l] + roll;
      if (pPosRef.current[l] === np && np > 0 && np < TOTAL) { lane = l; break; }
    }
    if (lane === null)
      lane = available.reduce((b,l) => aPosRef.current[l] > aPosRef.current[b] ? l : b, available[0]);
    let to = await moveSteps('a', lane, roll);
    showFloat('a', lane, `+${roll}`);
    if (to >= TOTAL) { await triggerScore(aiChar, false, lane); }
    to = await applySpecial('a', lane, to);
    await checkCapture('a', lane, to);
    if (checkWin('a')) { setGameOver('ai'); setPhase('gameover'); return; }
    if (skipPlayerRef.current) {
      skipPlayerRef.current = false;
      setSkipPlayer(false);
      setStatus(`🛑 ${char.name} pierde turno por BLOQUEO`);
      await D(1600);
      setPhase('ai'); await runAI();
    } else {
      setPhase('player'); setStatus('¡Tu turno!');
    }
  };

  // Report result to parent when game ends
  useEffect(() => {
    if (gameOver && onResult) onResult(char.id, gameOver);
  }, [gameOver]);

  const resetGame = () => {
    pPosRef.current=[0,0,0,0]; aPosRef.current=[0,0,0,0];
    setPPos([0,0,0,0]); setAPos([0,0,0,0]);
    setPhase('player'); setGameOver(null); setSkipAI(false); setSkipPlayer(false); skipPlayerRef.current=false;
    setDiceVal(null); setAiDiceVal(null);
    setRolling(false); setAiRolling(false);
    setSelectLanes([]); setFloats({}); setStatus('¡Tu turno!');
  };

  // === GAME SCREEN ===
  return (
    <div style={{position:'fixed',inset:0,background:'#0a1628',zIndex:115,
      display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden'}}>

      {/* HEADER */}
      <div style={{width:'100%',maxWidth:480,flexShrink:0,
        background:'linear-gradient(90deg,#c8001a,#e8242b,#c8001a)',
        borderBottom:'3px solid #7a0010',
        display:'flex',alignItems:'center',padding:'6px 10px',gap:6,position:'relative',zIndex:5}}>
        {[0,1,2,3,4,5].map(i=>(
          <div key={i} style={{position:'absolute',top:0,bottom:0,left:`${i*18}%`,width:'7%',
            background:'rgba(0,0,0,.08)',transform:'skewX(-15deg)',pointerEvents:'none'}}/>
        ))}
        <button onClick={()=>{resetGame();onBack();}} style={{
          background:'rgba(0,0,0,.35)',color:'#fff',border:'2px solid rgba(255,255,255,.4)',
          fontSize:11,cursor:'pointer',padding:'4px 9px',fontFamily:'Bangers',letterSpacing:1,
          borderRadius:5,position:'relative',flexShrink:0}}>&#8592; SALIR</button>
        <div style={{flex:1,textAlign:'center',position:'relative'}}>
          <p style={{fontFamily:'Bangers',fontSize:18,color:'#fff',letterSpacing:3,lineHeight:1,
            textShadow:'2px 2px 0 rgba(0,0,0,.5)'}}>
            {char.name} <span style={{color:'#ffd700'}}>VS</span> {aiChar.name}
          </p>
          <p style={{fontSize:11,color:'rgba(255,255,255,.65)',letterSpacing:3,marginTop:1}}>
            &#183; CARRERA AL ARO &#183; META EXACTA &#183;
          </p>
        </div>
        <div style={{fontFamily:'Bangers',fontSize:11,color:'#fff',
          textAlign:'right',lineHeight:1.5,flexShrink:0}}>
          <p style={{color:'#ffd700'}}>&#10003; {pPos.filter(p=>p>=TOTAL).length}/{WIN_NEED}</p>
          <p style={{color:'rgba(255,255,255,.5)'}}>CPU {aPos.filter(p=>p>=TOTAL).length}/{WIN_NEED}</p>
        </div>
      </div>

      {/* MAIN ROW */}
      <div style={{width:'100%',maxWidth:480,flex:1,minHeight:0,display:'flex',overflow:'hidden'}}>

        {/* LEFT — PLAYER CARD */}
        <div style={{width:76,flexShrink:0,
          background:'linear-gradient(180deg,#0d1c3a,#0a1628)',
          borderRight:`2px solid ${char.color}44`,
          display:'flex',flexDirection:'column',alignItems:'center',
          padding:'8px 4px',gap:4,
          boxShadow:`inset -6px 0 18px ${char.color}18`}}>
          <div style={{position:'relative'}}>
            <div style={{width:46,height:46,borderRadius:'50%',overflow:'hidden',
              border:`2px solid ${char.color}`,
              boxShadow:`0 0 14px ${char.color}aa`,
              background:char.color,
              animation:(phase==='player'||phase==='select')?'charPulse 1.8s ease infinite':'none'}}>
              <CharFace charId={char.id} size={46}/>
            </div>
            {(phase==='player'||phase==='select')&&(
              <div style={{position:'absolute',top:1,right:1,width:10,height:10,borderRadius:'50%',
                background:'#22c55e',border:'2px solid #0a1628',boxShadow:'0 0 6px #22c55e'}}/>
            )}
          </div>
          <p style={{fontFamily:'Bangers',fontSize:11,color:char.color,letterSpacing:1,
            textAlign:'center',lineHeight:1,textShadow:`0 0 10px ${char.color}88`}}>{char.name}</p>
          <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center',maxWidth:64}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{
                width:14,height:14,borderRadius:'50%',
                background:pPos[i]>=TOTAL?'transparent':'rgba(255,255,255,.1)',
                border:`2px solid ${pPos[i]>=TOTAL?char.color:'rgba(255,255,255,.15)'}`,
                boxShadow:pPos[i]>=TOTAL?`0 0 8px ${char.color}`:'none',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:pPos[i]>=TOTAL?10:0,
                animation:pPos[i]>=TOTAL?'ballPip .5s cubic-bezier(.175,.885,.32,1.275)':'none',
                transition:'all .4s'}}>
                {pPos[i]>=TOTAL?'🏀':''}
              </div>
            ))}
          </div>
          <p style={{fontFamily:'Bangers',fontSize:22,color:'#fff',lineHeight:1,
            textShadow:`0 0 12px ${char.color}`}}>
            {pPos.filter(p=>p>=TOTAL).length}
            <span style={{fontSize:11,color:`${char.color}88`}}>/{WIN_NEED}</span>
          </p>
          <div style={{background:`linear-gradient(145deg,${char.color}cc,${char.color}88)`,
            borderRadius:10,padding:3,
            boxShadow:`0 3px 12px ${char.color}66`,
            border:`2px solid ${char.color}`}}>
            <Dice3D val={diceVal} rolling={rolling} color={char.color} size={42}/>
          </div>
          <p style={{fontFamily:'Bangers',fontSize:10,letterSpacing:1,
            color:rolling?char.color:(phase==='player'?'#aaa':'rgba(255,255,255,.3)'),
            textShadow:rolling?`0 0 8px ${char.color}`:'none'}}>
            {rolling?'...':(phase==='player'||phase==='select')?'TIRA':''}
          </p>
        </div>

        {/* CENTER TRACK */}
        <div style={{flex:1,position:'relative',overflow:'hidden',
          background:'#e8dfc4',boxShadow:'inset 0 0 30px rgba(0,0,0,.15)'}}>

          {/* Lane backgrounds */}
          {[0,1,2,3].map(i=>(
            <div key={i} style={{position:'absolute',left:`${i*25}%`,width:'25%',top:'10%',bottom:'12%',
              background:i%2===0?'rgba(255,255,255,.18)':'rgba(0,0,0,.05)',pointerEvents:'none'}}/>
          ))}
          {/* Lane dividers */}
          {[1,2,3].map(i=>(
            <div key={i} style={{position:'absolute',left:`${i*25}%`,top:0,bottom:0,
              width:1.5,background:'rgba(100,70,20,.3)',zIndex:2}}/>
          ))}

          {/* FINISH ZONE — LEGO GYMNASIUM */}
          <div style={{position:'absolute',top:0,left:0,right:0,height:'13%',zIndex:3,overflow:'hidden',
            borderBottom:'3px solid #c04000'}}>

            {/* Fondo gimnasio Shohoku — zoom centrado en el aro */}
            <img src="./aro_fondo.png" alt=""
              style={{position:'absolute',inset:0,width:'100%',height:'100%',
                objectFit:'cover',objectPosition:'center 28%',
                transform:'scale(3.2)',transformOrigin:'50% 30%',
                pointerEvents:'none'}}/>

            {/* Bottom fade to dark track */}
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:'30%',
              background:'linear-gradient(transparent,rgba(0,0,0,.22))',
              pointerEvents:'none'}}/>

            {/* Hoop flash overlay */}
            {hoopAnim&&<div style={{position:'absolute',inset:0,
              background:'radial-gradient(circle at 50% 55%,rgba(255,120,0,.4),transparent 55%)',
              animation:'hoopFlash .3s ease 3',pointerEvents:'none'}}/>}

            {/* Basketball animation when scoring */}
            {hoopAnim&&(
              <div style={{position:'absolute',left:`${hoopAnim.lane*25+12.5}%`,top:'40%',
                zIndex:20,pointerEvents:'none',
                animation:'ballFly 1.35s cubic-bezier(.22,1,.36,1) forwards'}}>
                <span style={{fontSize:28,display:'block',filter:'drop-shadow(0 4px 8px rgba(0,0,0,.8))'}}>🏀</span>
              </div>
            )}
            {hoopAnim&&(
              <div style={{position:'absolute',left:'50%',top:'50%',zIndex:21,pointerEvents:'none',
                animation:'scoreLabel 1.35s ease forwards'}}>
                <span style={{fontFamily:'Bangers',fontSize:22,
                  color:hoopAnim.player==='p'?'#22c55e':'#ef4444',
                  textShadow:`0 0 20px ${hoopAnim.player==='p'?'#22c55e':'#ef4444'}`,
                  whiteSpace:'nowrap'}}>
                  {hoopAnim.player==='p'?'¡CANASTA!':'CPU ANOTA'}
                </span>
              </div>
            )}
          </div>

          {/* Cell grid lines — TC=20 cells, no phantom row */}
          {Array.from({length:TC+1},(_,i)=>(
            <div key={i} style={{position:'absolute',left:0,right:0,
              top:`${13+i*CELL}%`,height:1,background:'rgba(100,70,15,.18)',zIndex:1}}/>
          ))}

          {/* Special cell bands */}
          {Object.entries(SPECIALS).map(([posStr,sp])=>{
            const pos=parseInt(posStr);
            const topPct=13+(TC-pos)*CELL+CELL*0.1;
            return(
              <div key={pos} style={{
                position:'absolute',left:0,right:0,
                top:`${topPct}%`,height:`${CELL*0.8}%`,
                background:`${sp.color}30`,
                borderTop:`2px solid ${sp.color}66`,
                borderBottom:`1px solid ${sp.color}22`,
                display:'flex',alignItems:'center',justifyContent:'center',gap:4,
                pointerEvents:'none',zIndex:2}}>
                <span style={{fontSize:11}}>{sp.emoji}</span>
                <span style={{fontFamily:'Bangers',fontSize:11,color:sp.color,
                  letterSpacing:1,textShadow:`0 0 8px ${sp.color}`}}>{sp.label}</span>
              </div>
            );
          })}

          {/* LAST STEP — subtle shield row (pos=TC=20, directly under finish zone) */}
          {(()=>{
            const topPct = 13;          // pos=20 cell starts immediately at finish zone bottom
            const shieldTop = topPct + CELL/2;
            return(
              <React.Fragment>
                {[0,1,2,3].map(lane=>(
                  <div key={lane} style={{
                    position:'absolute',
                    left:`${lane*25+12.5}%`,
                    top:`${shieldTop}%`,
                    transform:'translate(-50%,-50%)',
                    pointerEvents:'none',zIndex:2,opacity:.38}}>
                    <svg width="14" height="16" viewBox="0 0 20 24" fill="#5c3a10">
                      {/* Cup body */}
                      <path d="M3 0H17L15 10Q13 14 10 14Q7 14 5 10Z"/>
                      {/* Left handle */}
                      <path d="M3 2C1 2 0 4 0 6C0 8 1 9 3 9L4 7C2 7 2 5 3 4Z"/>
                      {/* Right handle */}
                      <path d="M17 2C19 2 20 4 20 6C20 8 19 9 17 9L16 7C18 7 18 5 17 4Z"/>
                      {/* Stem */}
                      <rect x="9" y="14" width="2" height="4"/>
                      {/* Base */}
                      <rect x="5" y="18" width="10" height="3" rx="1"/>
                    </svg>
                  </div>
                ))}
              </React.Fragment>
            );
          })()}

          {/* PIECES */}
          {[0,1,2,3].map(lane=>(
            <React.Fragment key={lane}>
              {/* CPU piece */}
              {aPos[lane]<TOTAL&&(
                <div style={{
                  position:'absolute',
                  left:aPos[lane]===0?`${lane*25+18}%`:`${lane*25+12.5}%`,
                  top:aPos[lane]===0?'94%':`${posY(aPos[lane])}%`,
                  transform:'translate(-50%,-50%)',
                  transition:'top 0.14s cubic-bezier(.4,0,.2,1), left 0.18s ease',
                  zIndex:5}}>
                  <div style={{position:'absolute',bottom:-4,left:'50%',transform:'translateX(-50%)',
                    width:26,height:6,borderRadius:'50%',background:'rgba(0,0,0,.3)',filter:'blur(3px)'}}/>
                  <div style={{width:32,height:32,borderRadius:'50%',overflow:'hidden',
                    border:`3px solid ${aiChar.color}`,
                    boxShadow:`0 0 12px ${aiChar.color}aa`,
                    background:`radial-gradient(circle at 35% 35%,${aiChar.color}ff,${aiChar.color}88)`}}>
                    <CharFace charId={aiChar.id} size={32}/>
                  </div>
                  <div style={{position:'absolute',bottom:-9,left:'50%',transform:'translateX(-50%)',
                    fontFamily:'Bangers',fontSize:6,color:'#fff',letterSpacing:.5,
                    background:`${aiChar.color}cc`,padding:'0 3px',borderRadius:2,whiteSpace:'nowrap'}}>CPU</div>
                  {floats[`a${lane}`]&&(
                    <div key={floats[`a${lane}`].ts} style={{
                      position:'absolute',top:'-22px',left:'50%',transform:'translateX(-50%)',
                      fontFamily:'Bangers',fontSize:13,color:'#ef4444',whiteSpace:'nowrap',
                      animation:'floatPoints .9s ease forwards'}}>
                      {floats[`a${lane}`].val}
                    </div>
                  )}
                </div>
              )}

              {/* PLAYER piece */}
              {pPos[lane]<TOTAL&&(
                <div onClick={()=>onSelectLane(lane)} style={{
                  position:'absolute',
                  left:pPos[lane]===0?`${lane*25+7}%`:`${lane*25+12.5}%`,
                  top:pPos[lane]===0?'94%':`${posY(pPos[lane])}%`,
                  transform:'translate(-50%,-50%)',
                  transition:'top 0.14s cubic-bezier(.4,0,.2,1), left 0.18s ease',
                  zIndex:6,
                  cursor:selectLanes.includes(lane)?'pointer':'default'}}>
                  {selectLanes.includes(lane)&&(
                    <div style={{position:'absolute',inset:-9,borderRadius:'50%',
                      background:`${char.color}22`,border:`2.5px solid ${char.color}`,
                      animation:'charPulse 0.65s ease infinite'}}/>
                  )}
                  <div style={{position:'absolute',bottom:-4,left:'50%',transform:'translateX(-50%)',
                    width:28,height:6,borderRadius:'50%',background:'rgba(0,0,0,.32)',filter:'blur(3px)'}}/>
                  <div style={{
                    width:34,height:34,borderRadius:'50%',overflow:'hidden',
                    border:`3px solid ${char.color}`,
                    boxShadow:selectLanes.includes(lane)
                      ?`0 0 22px ${char.color},0 0 40px ${char.color}66`
                      :`0 0 12px ${char.color}aa`,
                    background:`radial-gradient(circle at 35% 35%,${char.color}ff,${char.color}88)`}}>
                    <CharFace charId={char.id} size={34}/>
                  </div>
                  {floats[`p${lane}`]&&(
                    <div key={floats[`p${lane}`].ts} style={{
                      position:'absolute',top:'-22px',left:'50%',transform:'translateX(-50%)',
                      fontFamily:'Bangers',fontSize:13,color:'#22c55e',whiteSpace:'nowrap',
                      animation:'floatPoints .9s ease forwards',textShadow:'0 0 8px #22c55e'}}>
                      {floats[`p${lane}`].val}
                    </div>
                  )}
                </div>
              )}

              {/* Finished player badge */}
              {pPos[lane]>=TOTAL&&(
                <div style={{position:'absolute',left:`${lane*25+6}%`,top:'7%',
                  transform:'translate(-50%,-50%)',zIndex:7}}>
                  <div style={{width:24,height:24,borderRadius:'50%',
                    background:char.color,border:'2.5px solid #fff',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:11,boxShadow:`0 0 12px ${char.color}`}}>&#10003;</div>
                </div>
              )}
              {/* Finished CPU badge */}
              {aPos[lane]>=TOTAL&&(
                <div style={{position:'absolute',left:`${lane*25+19}%`,top:'7%',
                  transform:'translate(-50%,-50%)',zIndex:6}}>
                  <div style={{width:24,height:24,borderRadius:'50%',
                    background:aiChar.color,border:'2.5px solid #fff',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:11,boxShadow:`0 0 12px ${aiChar.color}`}}>&#10003;</div>
                </div>
              )}

              {/* Capture flash */}
              {captureFlash===lane&&(
                <div style={{position:'absolute',left:`${lane*25}%`,width:'25%',
                  top:0,bottom:0,background:'rgba(255,220,0,.45)',
                  animation:'cellFlash .9s ease',pointerEvents:'none',zIndex:10}}/>
              )}
            </React.Fragment>
          ))}

          {/* START ZONE */}
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:'12%',
            background:'linear-gradient(180deg,#2d8a2d,#1a5a1a)',
            borderTop:'3px solid #44cc44',zIndex:3,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <p style={{fontFamily:'Bangers',fontSize:10,color:'rgba(255,255,255,.9)',
              letterSpacing:4,textShadow:'1px 1px 0 rgba(0,0,0,.5)'}}>START</p>
          </div>

          {/* POPUP */}
          {popup&&(
            <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.75)',
              display:'flex',alignItems:'center',justifyContent:'center',zIndex:20}}>
              <div style={{
                background:'linear-gradient(145deg,#0a0020,#1a0030)',
                border:`3px solid ${popup.color}`,borderRadius:14,
                padding:'16px 24px',textAlign:'center',
                animation:'zoomIn .3s cubic-bezier(.175,.885,.32,1.275)',
                boxShadow:`0 0 50px ${popup.color}88`}}>
                <p style={{fontSize:36,marginBottom:5}}>{popup.emoji}</p>
                <p style={{fontFamily:'Bangers',fontSize:24,color:popup.color,
                  letterSpacing:3,textShadow:`0 0 20px ${popup.color}`,marginBottom:4}}>{popup.label}</p>
                <p style={{fontSize:11,color:'rgba(255,255,255,.75)'}}>{popup.text}</p>
              </div>
            </div>
          )}
        </div>

        {/* RIGHT — CPU CARD */}
        <div style={{width:76,flexShrink:0,
          background:'linear-gradient(180deg,#0d1c3a,#0a1628)',
          borderLeft:`2px solid ${aiChar.color}44`,
          display:'flex',flexDirection:'column',alignItems:'center',
          padding:'8px 4px',gap:4,
          boxShadow:`inset 6px 0 18px ${aiChar.color}18`}}>
          <div style={{position:'relative'}}>
            <div style={{width:46,height:46,borderRadius:'50%',overflow:'hidden',
              border:`2px solid ${aiChar.color}`,
              boxShadow:`0 0 14px ${aiChar.color}aa`,
              background:aiChar.color,
              animation:phase==='ai'?'charPulse 1.8s ease infinite':'none'}}>
              <CharFace charId={aiChar.id} size={46}/>
            </div>
            {phase==='ai'&&(
              <div style={{position:'absolute',top:1,right:1,width:10,height:10,borderRadius:'50%',
                background:'#f59e0b',border:'2px solid #0a1628',boxShadow:'0 0 6px #f59e0b'}}/>
            )}
          </div>
          <p style={{fontFamily:'Bangers',fontSize:11,color:aiChar.color,letterSpacing:1,
            textAlign:'center',lineHeight:1,textShadow:`0 0 10px ${aiChar.color}88`}}>{aiChar.name}</p>
          <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center',maxWidth:64}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{
                width:14,height:14,borderRadius:'50%',
                background:aPos[i]>=TOTAL?'transparent':'rgba(255,255,255,.1)',
                border:`2px solid ${aPos[i]>=TOTAL?aiChar.color:'rgba(255,255,255,.15)'}`,
                boxShadow:aPos[i]>=TOTAL?`0 0 8px ${aiChar.color}`:'none',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:aPos[i]>=TOTAL?10:0,
                animation:aPos[i]>=TOTAL?'ballPip .5s cubic-bezier(.175,.885,.32,1.275)':'none',
                transition:'all .4s'}}>
                {aPos[i]>=TOTAL?'🏀':''}
              </div>
            ))}
          </div>
          <p style={{fontFamily:'Bangers',fontSize:22,color:'#fff',lineHeight:1,
            textShadow:`0 0 12px ${aiChar.color}`}}>
            {aPos.filter(p=>p>=TOTAL).length}
            <span style={{fontSize:11,color:`${aiChar.color}88`}}>/{WIN_NEED}</span>
          </p>
          <div style={{background:`linear-gradient(145deg,${aiChar.color}cc,${aiChar.color}88)`,
            borderRadius:10,padding:3,
            boxShadow:`0 3px 12px ${aiChar.color}66`,
            border:`2px solid ${aiChar.color}`}}>
            <Dice3D val={aiDiceVal} rolling={aiRolling} color={aiChar.color} size={42}/>
          </div>
          <p style={{fontFamily:'Bangers',fontSize:10,letterSpacing:1,
            color:aiRolling?aiChar.color:'#94a3b8',
            textShadow:aiRolling?`0 0 8px ${aiChar.color}`:'none'}}>
            {aiRolling?'...':(aiDiceVal&&phase!=='player')?`${aiDiceVal}`:'CPU'}
          </p>
        </div>
      </div>

      {/* CONTROLS */}
      <div style={{width:'100%',maxWidth:480,flexShrink:0,
        background:'linear-gradient(180deg,#0d1830,#080e22)',
        borderTop:'3px solid #e8242b',padding:'7px 14px 10px'}}>
        <p style={{textAlign:'center',fontFamily:'Bangers',fontSize:11,letterSpacing:2,
          minHeight:16,marginBottom:5,
          color:phase==='select'?'#fbbf24'
            :phase==='ai'?aiChar.color
            :'rgba(255,255,255,.75)',
          textShadow:phase==='select'?'0 0 12px #fbbf24'
            :phase==='ai'?`0 0 10px ${aiChar.color}`
            :'none'}}>
          {status}
        </p>
        {/* DICE POWER-UP PANEL */}
        {showDicePanel&&phase==='player'&&(
          <div style={{display:'flex',gap:6,marginBottom:6,animation:'slideUp .2s ease'}}>
            {SHOP_ITEMS.map(item=>{
              const active = localMod===item.id;
              const canAfford = gameCoins>=item.cost;
              return (
                <div key={item.id} onClick={()=>{
                  if(active){setLocalMod(null);setShowDicePanel(false);return;}
                  if(!canAfford) return;
                  const nc=gameCoins-item.cost;
                  localStorage.setItem('animevs_coins',String(nc));
                  setGameCoins(nc);
                  setLocalMod(item.id);
                  setShowDicePanel(false);
                }}
                  style={{flex:1,padding:'8px 4px',borderRadius:10,cursor:canAfford?'pointer':'not-allowed',
                    textAlign:'center',transition:'all .15s',
                    background:active?`${item.color}30`:'rgba(255,255,255,.08)',
                    border:`2px solid ${active?item.color:'rgba(255,255,255,.15)'}`,
                    opacity:canAfford?1:.4}}>
                  <div style={{fontSize:18,lineHeight:1}}>{item.emoji}</div>
                  <p style={{fontFamily:'Bangers',fontSize:10,color:active?item.color:'#ccc',
                    letterSpacing:.5,marginTop:2,lineHeight:1}}>{item.label}</p>
                  <p style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{item.desc}</p>
                  <p style={{fontFamily:'Bangers',fontSize:11,color:'#f59e0b',marginTop:2}}>
                    {active?'✓ ACTIVO':('🪙 '+item.cost)}
                  </p>
                </div>
              );
            })}
          </div>
        )}

        {phase==='select'?(
          <div style={{width:'100%',padding:'11px',
            background:'linear-gradient(135deg,#78350f,#92400e)',
            border:'2px solid #fbbf24',borderRadius:12,textAlign:'center',
            boxShadow:'0 0 24px rgba(251,191,36,.45)'}}>
            <p style={{fontFamily:'Bangers',fontSize:14,color:'#fde68a',letterSpacing:2}}>
              &#9654; ELIGE UN JUGADOR PARA AVANZAR
            </p>
          </div>
        ):(
          <div style={{display:'flex',gap:6,alignItems:'stretch'}}>
            {/* ⚡ power-up toggle */}
            <button onClick={()=>setShowDicePanel(p=>!p)}
              disabled={phase!=='player'}
              style={{
                flexShrink:0,width:46,borderRadius:12,cursor:phase==='player'?'pointer':'default',
                background:showDicePanel
                  ?'linear-gradient(135deg,#7c3aed,#6b46c1)'
                  :localMod?'rgba(245,158,11,.2)':'rgba(255,255,255,.07)',
                border:`2px solid ${showDicePanel?'#9f7aea':localMod?'#f59e0b':'rgba(255,255,255,.12)'}`,
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                gap:2,padding:'6px 0',opacity:1,transition:'all .2s'}}>
              <span style={{fontSize:18,opacity:phase==='player'?1:.4}}>⚡</span>
              <span style={{fontFamily:'Bangers',fontSize:11,color:'#f59e0b'}}>{gameCoins}</span>
            </button>
            <button onClick={rollDice} disabled={phase!=='player'} className='vs-btn'
              style={{flex:1,padding:'13px',fontSize:phase==='player'?17:14,letterSpacing:3,
                opacity:1,
                color: phase==='player' ? '#fff' : aiChar.color,
                textShadow: phase==='player'
                  ? '0 1px 4px rgba(0,0,0,.6)'
                  : `0 0 12px ${aiChar.color}, 0 1px 3px rgba(0,0,0,.8)`,
                background:phase==='player'
                  ?'linear-gradient(135deg,#e8242b 0%,#ff4444 50%,#e8242b 100%)'
                  :phase==='ai'
                  ?`linear-gradient(135deg,rgba(20,20,40,.9),rgba(30,30,55,.9))`
                  :'rgba(255,255,255,.06)',
                border:phase==='player'?'2px solid #ff6666'
                  :phase==='ai'?`2px solid ${aiChar.color}99`
                  :'2px solid rgba(255,255,255,.07)',
                boxShadow:phase==='player'
                  ?'0 4px 28px rgba(232,36,43,.6),0 0 50px rgba(232,36,43,.25)'
                  :phase==='ai'?`0 4px 20px ${aiChar.color}55, inset 0 0 20px ${aiChar.color}11`:'none',
                borderRadius:14,transition:'all .3s',
                animation:phase==='ai'?'charPulse 1.8s ease infinite':'none'}}>
              {phase==='player'
                ?`🎲  ${localMod?({high:'⬆️',low:'⬇️',even:'⚡',odd:'🔥'})[localMod]+' TIRAR':'TIRAR DADO'}`
                :aiRolling?`⚡  ${aiChar.name} LANZANDO...`
                :rolling?'⚡  LANZANDO...'
                :phase==='ai'?`⏳  ${aiChar.name} PENSANDO...`
                :`⏳  ${aiChar.name}...`}
            </button>
          </div>
        )}
        <div style={{display:'flex',gap:3,justifyContent:'center',marginTop:6,flexWrap:'wrap'}}>
          {Object.values(SPECIALS).map(sp=>(
            <span key={sp.label} style={{fontSize:10,color:sp.color,
              background:`${sp.color}18`,border:`1px solid ${sp.color}33`,
              borderRadius:4,padding:'2px 5px',fontFamily:'Bangers',letterSpacing:.5}}>
              {sp.emoji} {sp.text}
            </span>
          ))}
        </div>
      </div>

      {/* SCORE CELEBRATION OVERLAY */}
      {celebAnim&&(
        <div style={{position:'fixed',inset:0,zIndex:180,pointerEvents:'none',
          animation:'celebOverlay 2s ease forwards'}}>
          {/* Dark bg */}
          <div style={{position:'absolute',inset:0,background:celebAnim.isPlayer
            ?'radial-gradient(ellipse at 50% 40%,rgba(0,60,0,.85),rgba(0,0,0,.92))'
            :'radial-gradient(ellipse at 50% 40%,rgba(60,0,0,.85),rgba(0,0,0,.92))'}}/>

          {/* Ring burst 1 */}
          <div style={{position:'absolute',top:'38%',left:'50%',width:160,height:160,
            borderRadius:'50%',border:`4px solid ${celebAnim.color}`,
            animation:'ringPulse 1.2s ease .1s forwards'}}/>
          {/* Ring burst 2 */}
          <div style={{position:'absolute',top:'38%',left:'50%',width:160,height:160,
            borderRadius:'50%',border:`3px solid ${celebAnim.color}88`,
            animation:'ringPulse2 1.4s ease .3s forwards'}}/>

          {/* Character face bouncing */}
          <div style={{position:'absolute',top:'30%',left:'50%',zIndex:10,
            animation:'charCelebrate 2s cubic-bezier(.175,.885,.32,1.275) forwards'}}>
            <div style={{width:110,height:110,borderRadius:'50%',overflow:'hidden',
              border:`5px solid ${celebAnim.color}`,
              boxShadow:`0 0 40px ${celebAnim.color},0 0 80px ${celebAnim.color}66`,
              background:`radial-gradient(circle at 35% 35%,${celebAnim.color}ff,${celebAnim.color}88)`}}>
              <CharFace charId={celebAnim.charId} size={110}/>
            </div>
            {/* Sparkle dots around face */}
            {[0,60,120,180,240,300].map(deg=>(
              <div key={deg} style={{position:'absolute',
                top:'50%',left:'50%',
                width:8,height:8,borderRadius:'50%',
                background:celebAnim.color,
                transform:`rotate(${deg}deg) translateX(70px) translate(-50%,-50%)`,
                animation:`ringPulse .8s ease ${deg/1800}s forwards`}}/>
            ))}
          </div>

          {/* Basketball going in */}
          <div style={{position:'absolute',top:'55%',left:'50%',zIndex:9,
            animation:'ballScore 2s cubic-bezier(.22,1,.36,1) forwards'}}>
            <span style={{fontSize:44,filter:'drop-shadow(0 6px 14px rgba(0,0,0,.9))'}}>🏀</span>
          </div>

          {/* Reaction text */}
          <div style={{position:'absolute',top:'72%',left:'50%',zIndex:11,
            animation:'reactionText 2s ease forwards'}}>
            <span style={{fontFamily:'Bangers',fontSize:34,letterSpacing:3,
              color:celebAnim.color,
              textShadow:`0 0 30px ${celebAnim.color},0 0 60px ${celebAnim.color},2px 2px 0 #000`,
              whiteSpace:'nowrap'}}>
              {celebAnim.text}
            </span>
          </div>

          {/* CANASTA label */}
          <div style={{position:'absolute',top:'83%',left:'50%',zIndex:11,
            transform:'translate(-50%,-50%)',
            fontFamily:'Bangers',fontSize:14,letterSpacing:4,
            color:celebAnim.isPlayer?'#22c55e':'#ef4444',
            textShadow:`0 0 16px ${celebAnim.isPlayer?'#22c55e':'#ef4444'}`}}>
            {celebAnim.isPlayer?'¡CANASTA!':'CPU ANOTA'}
          </div>
        </div>
      )}

      {/* GAME OVER */}
      {gameOver&&(
        <div style={{position:'fixed',inset:0,
          background:'radial-gradient(ellipse at 50% 30%,rgba(20,0,10,.97),rgba(4,0,8,1))',
          zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',
          flexDirection:'column',gap:10,padding:20}}>
          <div style={{position:'absolute',inset:0,
            border:`10px solid ${gameOver==='player'?'#22c55e':'#e8242b'}`,pointerEvents:'none'}}/>
          <p style={{fontFamily:'Bangers',fontSize:11,color:'#555',letterSpacing:5,position:'relative'}}>
            SLAM DUNK &#183; GAME OVER
          </p>
          <div style={{fontSize:64,animation:'zoomIn .4s cubic-bezier(.175,.885,.32,1.275)',position:'relative'}}>
            {gameOver==='player'?'🏆':'😡'}
          </div>
          <p style={{fontFamily:'Bangers',fontSize:54,letterSpacing:3,textAlign:'center',
            color:gameOver==='player'?'#22c55e':'#e8242b',
            textShadow:`0 0 40px ${gameOver==='player'?'#22c55e':'#e8242b'}, 3px 3px 0 #000`,
            animation:'zoomIn .5s ease',position:'relative'}}>
            {gameOver==='player'?'¡GANASTE!':'CPU GANÓ'}
          </p>
          <div style={{display:'flex',gap:20,alignItems:'center',position:'relative'}}>
            <div style={{textAlign:'center'}}>
              <div style={{width:64,height:64,borderRadius:'50%',overflow:'hidden',
                border:`4px solid ${char.color}`,margin:'0 auto 4px',boxShadow:`0 0 24px ${char.color}`}}>
                <CharFace charId={char.id} size={64}/>
              </div>
              <p style={{fontFamily:'Bangers',fontSize:12,color:char.color}}>{char.name}</p>
              <p style={{fontFamily:'Bangers',fontSize:22,color:'#fff'}}>
                {pPos.filter(p=>p>=TOTAL).length}
                <span style={{fontSize:10,color:'#555'}}>/{WIN_NEED}</span>
              </p>
            </div>
            <p style={{fontFamily:'Bangers',fontSize:26,color:'#333'}}>VS</p>
            <div style={{textAlign:'center'}}>
              <div style={{width:64,height:64,borderRadius:'50%',overflow:'hidden',
                border:`4px solid ${aiChar.color}`,margin:'0 auto 4px',boxShadow:`0 0 24px ${aiChar.color}`}}>
                <CharFace charId={aiChar.id} size={64}/>
              </div>
              <p style={{fontFamily:'Bangers',fontSize:12,color:aiChar.color}}>{aiChar.name}</p>
              <p style={{fontFamily:'Bangers',fontSize:22,color:'#fff'}}>
                {aPos.filter(p=>p>=TOTAL).length}
                <span style={{fontSize:10,color:'#555'}}>/{WIN_NEED}</span>
              </p>
            </div>
          </div>
          <p style={{fontFamily:'Bangers',fontSize:13,color:'#a0aec0',letterSpacing:2,
            marginTop:4,position:'relative'}}>¿QUÉ HACEMOS?</p>
          <button onClick={()=>{setAiIdx(i=>i+1);resetGame();}} className='vs-btn'
            style={{padding:'13px',fontSize:16,width:'100%',maxWidth:300,
              background:'linear-gradient(135deg,#e8242b,#ff5544)',position:'relative'}}>
            ⚔️ SIGUIENTE RIVAL
          </button>
          <button onClick={resetGame}
            style={{color:'#f6ad55',background:'rgba(246,173,85,.08)',border:'1px solid rgba(246,173,85,.3)',
              cursor:'pointer',fontFamily:'Bangers',fontSize:13,letterSpacing:1,position:'relative',
              borderRadius:8,padding:'8px 20px'}}>
            &#128260; REVANCHA
          </button>
          <button onClick={()=>{resetGame();onBack();}}
            style={{color:'#94a3b8',background:'transparent',border:'none',cursor:'pointer',
              fontFamily:'Bangers',fontSize:11,letterSpacing:1,position:'relative'}}>
            &#8592; SALIR
          </button>
        </div>
      )}
    </div>
  );
}


// ─── SHOP ITEMS ──────────────────────────────────────────────────────────────
const SHOP_ITEMS = [
  { id:'high', emoji:'⬆️', label:'Dados Altos',   desc:'Solo 4·5·6', cost:60, color:'#22c55e' },
  { id:'low',  emoji:'⬇️', label:'Dados Bajos',   desc:'Solo 1·2·3', cost:40, color:'#3b82f6' },
  { id:'even', emoji:'⚡', label:'Dados Pares',   desc:'Solo 2·4·6', cost:50, color:'#f59e0b' },
  { id:'odd',  emoji:'🔥', label:'Dados Impares', desc:'Solo 1·3·5', cost:50, color:'#ef4444' },
];

// ─── CAMPAIGN MODE ────────────────────────────────────────────────────────────
function CampaignMode({ onBack, charStats={}, onUpdateStats }) {
  const [phase, setPhase]       = useState('char_select');
  const [campChar, setCampChar] = useState(null);
  const [round, setRound]       = useState(0);
  const [coins, setCoins]       = useState(() => parseInt(localStorage.getItem('animevs_coins')||'0'));
  const [diceModifier, setDiceModifier] = useState(null);
  const [lastEarned, setLastEarned]     = useState(0);

  const saveCoins = c => { localStorage.setItem('animevs_coins', String(c)); setCoins(c); };
  const rivals = campChar ? CHARS.filter(c => c.id !== campChar.id) : [];
  const rival  = rivals[round] || null;

  const Btn = ({onClick,children,style={}}) => (
    <button onClick={onClick} className="vs-btn"
      style={{width:'100%',maxWidth:320,padding:'14px',fontSize:18,...style}}>
      {children}
    </button>
  );
  const BackBtn = ({onClick,label='← VOLVER'}) => (
    <button onClick={onClick} style={{background:'transparent',color:'#94a3b8',
      border:'none',cursor:'pointer',fontFamily:'Bangers',fontSize:12,letterSpacing:1,
      alignSelf:'flex-start',marginBottom:4}}>
      {label}
    </button>
  );
  const CoinBar = () => (
    <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',
      borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{fontSize:11,color:'#d97706',fontWeight:700}}>🪙 Monedas</span>
      <span style={{fontFamily:'Bangers',fontSize:22,color:'#f59e0b'}}>{coins}</span>
    </div>
  );

  // ── CHAR SELECT ────────────────────────────────────────────────────────────
  if (phase === 'char_select') return (
    <div style={{position:'fixed',inset:0,background:'#0a0a14',zIndex:200,overflowY:'auto',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 14px',gap:12}}>
      <div style={{width:'100%',maxWidth:460,display:'flex',flexDirection:'column',gap:12}}>
        <BackBtn onClick={onBack}/>
        <div style={{textAlign:'center'}}>
          <p style={{fontFamily:'Bangers',fontSize:10,color:'#6b46c1',letterSpacing:4}}>MODO CAMPAÑA</p>
          <h2 style={{fontFamily:'Bangers',fontSize:36,color:'#fff',letterSpacing:2,lineHeight:1}}>ELIGE TU JUGADOR</h2>
          <p style={{fontSize:11,color:'#94a3b8',marginTop:4}}>Enfrentarás a los 4 rivales de Shohoku en secuencia</p>
          {coins>0&&<p style={{fontFamily:'Bangers',fontSize:15,color:'#f59e0b',marginTop:6}}>🪙 {coins} monedas guardadas</p>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
          {CHARS.map(c=>(
            <div key={c.id} onClick={()=>{setCampChar(c);setRound(0);setPhase('pre_round');}}
              style={{padding:8,borderRadius:12,cursor:'pointer',textAlign:'center',
                background:`${c.color}18`,border:`2px solid ${c.color}66`,transition:'all .15s'}}>
              <div style={{borderRadius:'50%',overflow:'hidden',width:50,height:50,margin:'0 auto 5px',
                border:`2px solid ${c.color}`}}>
                <CharFace charId={c.id} size={50}/>
              </div>
              <p style={{fontFamily:'Bangers',fontSize:11,color:c.color,letterSpacing:1}}>{c.name}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // ── PRE ROUND (SHOP) ───────────────────────────────────────────────────────
  if (phase === 'pre_round') return (
    <div style={{position:'fixed',inset:0,background:'#0a0a14',zIndex:200,overflowY:'auto',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 14px',gap:10}}>
      <div style={{width:'100%',maxWidth:460,display:'flex',flexDirection:'column',gap:10}}>
        <BackBtn onClick={()=>setPhase('char_select')} label='← CAMBIAR PERSONAJE'/>
        <div style={{textAlign:'center'}}>
          <p style={{fontFamily:'Bangers',fontSize:10,color:'#6b46c1',letterSpacing:4}}>MODO CAMPAÑA</p>
          <h2 style={{fontFamily:'Bangers',fontSize:40,color:'#fff',letterSpacing:3,lineHeight:1}}>
            RONDA {round+1} <span style={{fontSize:16,color:'#94a3b8'}}>de 4</span>
          </h2>
        </div>

        {/* VS Preview */}
        <div style={{background:'rgba(255,255,255,.04)',borderRadius:18,padding:14,
          border:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',gap:10}}>
          <div style={{textAlign:'center',flex:1}}>
            <div style={{width:60,height:60,borderRadius:'50%',overflow:'hidden',margin:'0 auto 6px',
              border:`3px solid ${campChar?.color}`,boxShadow:`0 0 16px ${campChar?.color}66`}}>
              <CharFace charId={campChar?.id} size={60}/>
            </div>
            <p style={{fontFamily:'Bangers',fontSize:13,color:campChar?.color}}>{campChar?.name}</p>
            <p style={{fontSize:11,color:'#94a3b8',letterSpacing:1}}>TÚ</p>
          </div>
          <p style={{fontFamily:'Bangers',fontSize:26,background:'linear-gradient(135deg,#f6ad55,#fc8181)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',flexShrink:0}}>VS</p>
          <div style={{textAlign:'center',flex:1}}>
            <div style={{width:60,height:60,borderRadius:'50%',overflow:'hidden',margin:'0 auto 6px',
              border:`3px solid ${rival?.color}`,boxShadow:`0 0 16px ${rival?.color}66`}}>
              <CharFace charId={rival?.id} size={60}/>
            </div>
            <p style={{fontFamily:'Bangers',fontSize:13,color:rival?.color}}>{rival?.name}</p>
            <p style={{fontSize:11,color:'#94a3b8',letterSpacing:1}}>RIVAL</p>
          </div>
        </div>

        <CoinBar/>

        <div style={{background:'rgba(109,70,193,.08)',border:'1px solid rgba(109,70,193,.2)',
          borderRadius:10,padding:'10px 14px',textAlign:'center'}}>
          <p style={{fontSize:11,color:'#9f7aea'}}>
            ⚡ Durante la partida puedes usar el botón <strong>⚡</strong> para comprar dados especiales
          </p>
        </div>

        <Btn onClick={()=>setPhase('race')}
          style={{background:'linear-gradient(135deg,#6b46c1,#9f7aea)',alignSelf:'center'}}>
          ⚔️ JUGAR RONDA {round+1}
        </Btn>
      </div>
    </div>
  );

  // ── RACE ──────────────────────────────────────────────────────────────────
  // Dificultad incremental: ronda 1=fácil, 2=normal, 3=difícil, 4=muy difícil
  const CAMPAIGN_DIFF = [0, 0.06, 0.13, 0.22];

  if (phase === 'race') return (
    <RaceMode
      selectedChar={campChar}
      fixedAiChar={rival}
      diceModifier={diceModifier}
      onBack={()=>setPhase('pre_round')}
      charStats={charStats}
      campaignDiff={CAMPAIGN_DIFF[round]}
      playerRP={parseInt(localStorage.getItem('animevs_rp')||'0')}
      onResult={(_,result)=>{
        const earned = result==='player' ? 150 : 30;
        saveCoins(coins+earned);
        setLastEarned(earned);
        setDiceModifier(null);
        if(onUpdateStats) onUpdateStats(campChar.id, result);
        if(result==='player') setPhase(round>=3?'champion':'round_win');
        else setPhase('round_lose');
      }}
    />
  );

  // ── ROUND WIN ─────────────────────────────────────────────────────────────
  if (phase === 'round_win') return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',
      zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'linear-gradient(145deg,#0a1f0a,#0d1a0d)',
        border:'2px solid #22c55e',borderRadius:24,
        width:'100%',maxWidth:360,padding:'28px 24px',
        boxShadow:'0 0 60px rgba(34,197,94,.3)',
        display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
        <p style={{fontFamily:'Bangers',fontSize:10,color:'#22c55e',letterSpacing:4}}>MODO CAMPAÑA · RONDA {round+1} DE 4</p>
        <div style={{fontSize:56,animation:'zoomIn .4s ease'}}>🏆</div>
        <h2 style={{fontFamily:'Bangers',fontSize:42,color:'#22c55e',letterSpacing:3,
          textShadow:'0 0 30px #22c55e',animation:'zoomIn .5s ease',textAlign:'center',margin:0}}>
          ¡RONDA<br/>SUPERADA!
        </h2>
        <div style={{display:'flex',alignItems:'center',gap:10,
          background:'rgba(245,158,11,.15)',border:'1px solid rgba(245,158,11,.4)',
          borderRadius:12,padding:'10px 20px'}}>
          <span style={{fontSize:20}}>🪙</span>
          <span style={{fontFamily:'Bangers',fontSize:26,color:'#f59e0b'}}>+{lastEarned}</span>
          <span style={{fontSize:11,color:'#d97706'}}>= {coins} total</span>
        </div>
        {round<3&&rivals[round+1]&&(
          <div style={{textAlign:'center'}}>
            <p style={{fontSize:10,color:'#94a3b8',marginBottom:6,letterSpacing:1}}>SIGUIENTE RIVAL</p>
            <div style={{width:60,height:60,borderRadius:'50%',overflow:'hidden',margin:'0 auto 5px',
              border:`3px solid ${rivals[round+1].color}`,boxShadow:`0 0 20px ${rivals[round+1].color}66`}}>
              <CharFace charId={rivals[round+1].id} size={60}/>
            </div>
            <p style={{fontFamily:'Bangers',fontSize:16,color:rivals[round+1].color}}>{rivals[round+1].name}</p>
          </div>
        )}
        <Btn onClick={()=>{setRound(r=>r+1);setPhase('pre_round');}}
          style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',width:'100%'}}>
          RONDA {round+2} →
        </Btn>
      </div>
    </div>
  );

  // ── ROUND LOSE ────────────────────────────────────────────────────────────
  if (phase === 'round_lose') return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',
      zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'linear-gradient(145deg,#1f0a0a,#1a0d0d)',
        border:'2px solid #ef4444',borderRadius:24,
        width:'100%',maxWidth:360,padding:'28px 24px',
        boxShadow:'0 0 60px rgba(239,68,68,.3)',
        display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
      <p style={{fontFamily:'Bangers',fontSize:10,color:'#ef4444',letterSpacing:4}}>GAME OVER · CAMPAÑA</p>
      <div style={{fontSize:52,animation:'zoomIn .4s ease'}}>😤</div>
      <h2 style={{fontFamily:'Bangers',fontSize:42,color:'#ef4444',letterSpacing:3,textAlign:'center',
        textShadow:'0 0 40px #ef4444,3px 3px 0 #000'}}>¡ELIMINADO!</h2>
      <p style={{fontSize:11,color:'#a0aec0',textAlign:'center'}}>
        Llegaste a la ronda {round+1} con {campChar?.name}
      </p>
      <div style={{display:'flex',gap:16,alignItems:'center',
        background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',
        borderRadius:12,padding:'10px 20px'}}>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'#94a3b8',letterSpacing:1}}>RONDAS</p>
          <p style={{fontFamily:'Bangers',fontSize:26,color:'#fff'}}>{round}<span style={{fontSize:12,color:'#94a3b8'}}>/4</span></p>
        </div>
        <div style={{width:1,height:32,background:'rgba(255,255,255,.08)'}}/>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'#94a3b8',letterSpacing:1}}>MONEDAS</p>
          <p style={{fontFamily:'Bangers',fontSize:26,color:'#f59e0b'}}>🪙 {coins}</p>
        </div>
      </div>
      <p style={{fontSize:10,color:'#22c55e'}}>✓ Monedas y progreso guardados</p>
      <Btn onClick={()=>setPhase('pre_round')}
        style={{background:'linear-gradient(135deg,#7c3aed,#6b46c1)'}}>
        🔄 REINTENTAR RONDA {round+1}
      </Btn>
      <button onClick={()=>{setCampChar(null);setRound(0);setPhase('char_select');}}
        style={{color:'#a0aec0',background:'transparent',border:'none',cursor:'pointer',
          fontFamily:'Bangers',fontSize:11,letterSpacing:1,marginTop:4}}>
        ↩ CAMBIAR PERSONAJE
      </button>
      <button onClick={onBack}
        style={{color:'#94a3b8',background:'transparent',border:'none',cursor:'pointer',
          fontFamily:'Bangers',fontSize:10,letterSpacing:1}}>
        ← MENÚ PRINCIPAL
      </button>
      </div>
    </div>
  );

  // ── CHAMPION ──────────────────────────────────────────────────────────────
  return (
    <div style={{position:'fixed',inset:0,
      background:'radial-gradient(ellipse at 50% 30%,rgba(245,158,11,.18),rgba(159,122,234,.1),#080810)',
      zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',gap:12,padding:20}}>
      <div style={{position:'absolute',inset:0,border:'6px solid #f59e0b',pointerEvents:'none'}}/>
      <p style={{fontFamily:'Bangers',fontSize:10,color:'#f59e0b',letterSpacing:4}}>CAMPAÑA · COMPLETADA</p>
      <div style={{fontSize:68,animation:'zoomIn .4s ease'}}>🏆</div>
      <h2 style={{fontFamily:'Bangers',fontSize:36,textAlign:'center',letterSpacing:2,lineHeight:1.1,
        background:'linear-gradient(135deg,#f6ad55,#fc8181,#9f7aea)',
        WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',animation:'zoomIn .6s ease'}}>
        ¡CAMPEÓN DE<br/>SHOHOKU!
      </h2>
      <div style={{width:80,height:80,borderRadius:'50%',overflow:'hidden',
        border:`4px solid ${campChar?.color}`,boxShadow:`0 0 40px ${campChar?.color}`}}>
        <CharFace charId={campChar?.id} size={80}/>
      </div>
      <p style={{fontFamily:'Bangers',fontSize:18,color:campChar?.color}}>{campChar?.name}</p>
      <div style={{display:'flex',gap:20,alignItems:'center',
        background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',
        borderRadius:12,padding:'12px 24px'}}>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'#94a3b8',letterSpacing:1}}>RONDAS</p>
          <p style={{fontFamily:'Bangers',fontSize:28,color:'#fff'}}>4/4</p>
        </div>
        <div style={{width:1,height:36,background:'rgba(255,255,255,.08)'}}/>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'#94a3b8',letterSpacing:1}}>MONEDAS</p>
          <p style={{fontFamily:'Bangers',fontSize:28,color:'#f59e0b'}}>🪙 {coins}</p>
        </div>
      </div>
      <Btn onClick={()=>{setRound(0);setCampChar(null);setPhase('char_select');}}
        style={{background:'linear-gradient(135deg,#f59e0b,#d97706)'}}>
        🔄 NUEVA CAMPAÑA
      </Btn>
      <button onClick={onBack}
        style={{color:'#94a3b8',background:'transparent',border:'none',cursor:'pointer',
          fontFamily:'Bangers',fontSize:10,letterSpacing:1,marginTop:4}}>
        ← MENÚ PRINCIPAL
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
function RankingScreen({ onBack, playerAlias }) {
  const wins    = parseInt(localStorage.getItem('animevs_wins')||'0');
  const losses  = parseInt(localStorage.getItem('animevs_losses')||'0');
  const coins   = parseInt(localStorage.getItem('animevs_coins')||'0');
  const rp      = parseInt(localStorage.getItem('animevs_rp')||'0');
  const total   = wins + losses;
  const pct     = total > 0 ? Math.round(wins/total*100) : 0;
  const favChar = localStorage.getItem('animevs_fav_char') || 'sakuragi';
  const favData = CHARS.find(c=>c.id===favChar) || CHARS[0];
  const playerLevel = Math.floor(rp / 30) + 1;
  const [globalRanking, setGlobalRanking] = useState([]);
  const [loadingRanking, setLoadingRanking] = useState(true);

  useEffect(() => {
    const load = async () => {
      // Sincronizar stats del jugador actual antes de cargar el ranking
      const alias = playerAlias;
      if (alias && alias !== 'Jugador' && window.savePlayerToFirebase) {
        const w   = parseInt(localStorage.getItem('animevs_wins')||'0');
        const l   = parseInt(localStorage.getItem('animevs_losses')||'0');
        const rp  = parseInt(localStorage.getItem('animevs_rp')||'0');
        const fav = localStorage.getItem('animevs_fav_char')||'sakuragi';
        await window.savePlayerToFirebase(alias, w, l, rp, fav);
      }
      if (window.getGlobalRanking) {
        const data = await window.getGlobalRanking();
        setGlobalRanking(data);
      }
      setLoadingRanking(false);
    };
    load();
  }, []);

  const myPos = globalRanking.length > 0
    ? globalRanking.findIndex(p => p.alias === playerAlias) + 1 || globalRanking.length + 1
    : '—';

  const medalColor = pos => pos===1?'#fbbf24':pos===2?'#94a3b8':'#b45309';
  const medalEmoji = pos => pos===1?'🥇':pos===2?'🥈':'🥉';

  const ROW = ({pos, name, wins:w, losses:l=0, pct:p, char, rp:rpVal=0, isMe=false}) => (
    <div style={{
      display:'flex',alignItems:'center',gap:12,
      padding:'11px 14px',
      background: isMe
        ? 'linear-gradient(90deg,rgba(251,191,36,.18),rgba(251,191,36,.08))'
        : pos%2===0 ? 'rgba(255,255,255,.03)' : 'rgba(255,255,255,.06)',
      borderRadius:12,
      border: isMe ? '1.5px solid rgba(251,191,36,.5)' : '1px solid rgba(255,255,255,.06)',
      marginBottom:6,
    }}>
      {/* Posición */}
      <div style={{width:30,textAlign:'center',flexShrink:0}}>
        {pos<=3
          ? <span style={{fontSize:20}}>{medalEmoji(pos)}</span>
          : <span style={{fontFamily:'Bangers,cursive',fontSize:17,
              color: isMe?'#fbbf24':'rgba(255,255,255,.5)'}}>{pos}</span>
        }
      </div>
      {/* Avatar */}
      <div style={{width:38,height:38,borderRadius:'50%',overflow:'hidden',flexShrink:0,
        border:`2px solid ${isMe?'#fbbf24':(CHARS.find(c=>c.id===char)||CHARS[0]).color}`,
        background:'#111'}}>
        <CharFace charId={char} size={38}/>
      </div>
      {/* Nombre */}
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontFamily:'Bangers,cursive',fontSize:16,letterSpacing:1,
          color: isMe?'#fbbf24':'#fff',margin:0,
          textShadow: isMe?'0 0 10px rgba(251,191,36,.6)':'none',
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {name}{isMe&&<span style={{fontSize:10,color:'rgba(251,191,36,.7)',marginLeft:6}}>← TÚ</span>}
        </p>
        <p style={{fontSize:10,color:'rgba(255,255,255,.4)',margin:0,letterSpacing:.5}}>
          {(CHARS.find(c=>c.id===char)||CHARS[0]).name}
          {(w+l)>0&&<span style={{marginLeft:5}}>· {Math.round(w/(w+l)*100)}% wins</span>}
        </p>
      </div>
      {/* Victorias destacadas + RP secundario */}
      <div style={{textAlign:'right',flexShrink:0}}>
        <p style={{fontFamily:'Bangers,cursive',fontSize:20,
          color: isMe?'#fbbf24':'#60a5fa',margin:0,
          textShadow: isMe?'0 0 12px rgba(251,191,36,.8)':'0 0 8px rgba(96,165,250,.3)'}}>
          {w} <span style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>W</span>
        </p>
        <p style={{fontSize:10,color:'rgba(255,255,255,.4)',margin:0}}>{String(w).padStart(2,'0')}/{String(w+l).padStart(2,'0')}</p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(180deg,#0a0818 0%,#130f2a 100%)',
      paddingBottom:40}}>

      {/* Header */}
      <div style={{
        background:'linear-gradient(135deg,#c47d00,#e8a000,#c47d00)',
        padding:'16px 16px 14px',textAlign:'center',position:'relative',
        boxShadow:'0 4px 24px rgba(200,120,0,.4)'}}>
        <button onClick={onBack}
          style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',
            background:'rgba(0,0,0,.25)',border:'2px solid rgba(255,255,255,.3)',
            color:'#fff',borderRadius:20,width:34,height:34,cursor:'pointer',
            fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>
          ←
        </button>
        <h2 style={{fontFamily:'Bangers,cursive',fontSize:26,color:'#fff',
          letterSpacing:3,margin:0,textShadow:'0 2px 8px rgba(0,0,0,.4)'}}>
          🏆 TABLA DE CLASIFICACIÓN
        </h2>
      </div>

      <div style={{maxWidth:480,margin:'0 auto',padding:'16px 14px'}}>

        {/* Tu récord rápido */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
          {[
            {label:'NIVEL',     val:'Nv'+playerLevel, color:'#a78bfa', icon:'⭐'},
            {label:'RP',        val:rp,    color:'#fbbf24', icon:'🏅'},
            {label:'VICTORIAS', val:wins,  color:'#4ade80', icon:'🏆'},
            {label:'% GANADAS', val:pct+'%', color:'#60a5fa', icon:'📊'},
          ].map(s=>(
            <div key={s.label} style={{background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:12,
              padding:'10px 6px',textAlign:'center'}}>
              <p style={{fontSize:16,margin:0}}>{s.icon}</p>
              <p style={{fontFamily:'Bangers,cursive',fontSize:20,color:s.color,
                margin:'2px 0 0',textShadow:`0 0 10px ${s.color}88`}}>{s.val}</p>
              <p style={{fontSize:8,color:'rgba(255,255,255,.35)',letterSpacing:.5}}>{s.label}</p>
            </div>
          ))}
        </div>

        {/* Cabecera tabla */}
        <div style={{display:'flex',padding:'6px 14px',marginBottom:4}}>
          <span style={{width:30,fontSize:10,color:'rgba(255,255,255,.35)',textAlign:'center'}}>#</span>
          <span style={{width:38,marginLeft:12}}/>
          <span style={{flex:1,fontSize:10,color:'rgba(255,255,255,.35)',marginLeft:12,letterSpacing:1}}>JUGADOR</span>
          <span style={{fontSize:10,color:'#60a5fa',letterSpacing:1}}>WINS</span>
        </div>

        {/* Lista global */}
        {loadingRanking ? (
          <div style={{textAlign:'center',padding:'30px',color:'rgba(255,255,255,.4)',
            fontFamily:'Bangers,cursive',letterSpacing:2,fontSize:14}}>
            ⏳ CARGANDO RANKING...
          </div>
        ) : globalRanking.length === 0 ? (
          <div style={{textAlign:'center',padding:'24px',color:'rgba(255,255,255,.3)',fontSize:12}}>
            Aún no hay jugadores en el ranking global.<br/>
            <span style={{color:'#fbbf24'}}>¡Sé el primero en jugar!</span>
          </div>
        ) : (
          globalRanking.map((p,i) => {
            const isMe = p.alias === playerAlias;
            const t = (p.wins||0)+(p.losses||0);
            const pc = t>0?Math.round((p.wins||0)/t*100):0;
            return <ROW key={p.alias} pos={i+1} name={p.alias}
              wins={p.wins||0} losses={p.losses||0} pct={pc} char={p.favChar||'sakuragi'} rp={p.rp||0} isMe={isMe}/>;
          })
        )}

        {/* Separador si el jugador no está en top 10 */}
        {!loadingRanking && globalRanking.length>0 && !globalRanking.find(p=>p.alias===playerAlias) && (<>
          <div style={{display:'flex',alignItems:'center',gap:8,margin:'12px 0'}}>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.1)'}}/>
            <span style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>···</span>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.1)'}}/>
          </div>
          <ROW pos={globalRanking.length+1} name={playerAlias||'Tú'}
            wins={wins} losses={losses} pct={pct} char={favData.id} rp={rp} isMe={true}/>
        </>)}

      </div>
    </div>
  );
}

const BAD_WORDS = [
  'puta','puto','mierda','culo','pene','vagina','concha','cono','joder',
  'cabron','pendejo','pendeja','marica','maricon','idiota','estupido',
  'gilipollas','hdp','forro','pelotudo','boludo','imbecil','perra','pito',
  'verga','culero','chinga','pinche','huevon','fuck','shit','bitch','cunt',
  'dick','cock','pussy','nigger','nigga','fag','whore','slut','twat','wank',
];

function containsBadWord(str) {
  const clean = s => s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]/g,'');
  const s = clean(str);
  return BAD_WORDS.some(w => s.includes(clean(w)));
}

    <div style={{position:'fixed',inset:0,zIndex:9999,
